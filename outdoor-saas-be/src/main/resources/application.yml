server:
  port: ${SERVER_PORT:16000}

spring:
  application:
    name: outdoor-saas
  web:
    resources:
      static-locations: classpath:/static/,classpath:/public/
  servlet:
    multipart:
      enabled: true   # 使用http multipart上传处理
      max-file-size: 100MB # 设置单个文件的最大长度，默认1M，如不限制配置为-1
      max-request-size: 100MB # 设置最大的请求文件的大小，默认10M，如不限制配置为-1
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 1000
      connection-timeout: 60000
      idle-timeout: 300000
      max-lifetime: 600000
      connection-test-query: SELECT 1
      pool-name: HikariPool
  data:
    redis:
      host: ${REDIS_HOST:192.168.31.120}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:2000ms}
      lettuce:
        pool:
          max-active: 1000
          max-idle: 10
          min-idle: 2

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: ${DB_SCHEMA:}
    liquibase-schema: ${DB_SCHEMA:}
    drop-first: false  # 生产环境必须为 false
    contexts: ${SPRING_PROFILES_ACTIVE:dev}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.touhuwai.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: true
    multiple-result-sets-enabled: true
    use-column-label: true
    use-generated-keys: true
    default-executor-type: simple
    default-statement-timeout: 25000

# 日志配置
logging:
  level:
    com.touhuwai.mapper: debug

# JWT 配置
jwt:
  secret: ${JWT_SECRET:111}
  expiration: ${JWT_EXPIRATION:86400000}

dify:
  # Dify API Key（从 Dify 应用设置中获取）
  api-key: ${DIFY_API_KEY:app-EkhsaONibzx6yTNnbf2s8vwv}
  # Dify API 基础 URL（云版：https://api.dify.ai/v1，本地版：http://your-domain/v1）
  base-url: ${DIFY_BASE_URL:http://dify.qianwei.tech/v1}

# API Key 配置（用于 Dify 自定义工具等外部系统调用）
api:
  # API Key 用于接口鉴权，建议设置强密码
  key: ${API_KEY:}

# CORS 跨域配置
cors:
  # 允许的源，多个用逗号分隔，生产环境应配置具体域名
  # 示例: https://app.example.com,https://admin.example.com
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  # 允许的 HTTP 方法
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
  # 允许的请求头
  allowed-headers: ${CORS_ALLOWED_HEADERS:*}
  # 是否允许携带凭证（cookies）
  allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}

# AI助手配置
ai:
  # 默认模式: DIFY 或 CUSTOM
  default-mode: DIFY
  
  # AgentScope Custom Agent配置
  custom:
    # 模型配置
    model:
      provider: ${AI_MODEL_PROVIDER:openai}
      api-key: ${AI_MODEL_API_KEY:sk-gugb1OlYqjuO}
      model-name: ${AI_MODEL_NAME:kimi-k2.5}
      base-url: ${AI_MODEL_BASE_URL:https://api.moonshot.cn/v1}
      
    # Agent配置
    agent:
      name: "投小智(Custom)"
      system-prompt: |
        你是户外广告投放管理系统的AI助手"投小智"，专门帮助用户管理广告业务。
        你可以使用以下工具：
        - 查询和管理广告活动
        - 分析投放数据
        - 生成报表
        - 优化广告策略
        - 页面导航
      max-iterations: 10
      timeout: 120s

