  /api/frame/{id}:
    get:
      tags:
        - 框架管理
      summary: 根据ID查询框架
      description: 获取指定ID的框架详细信息
      operationId: get_frame
      parameters:
        - name: id
          in: path
          required: true
          description: 框架ID
          schema:
            type: integer
      responses:
        '200':
          description: 成功

    delete:
      tags:
        - 框架管理
      summary: 删除框架
      description: 根据ID删除指定框架
      operationId: delete_frame
      parameters:
        - name: id
          in: path
          required: true
          description: 框架ID
          schema:
            type: integer
      responses:
        '200':
          description: 删除成功

  /api/frame:
    post:
      tags:
        - 框架管理
      summary: 创建框架
      description: 创建新框架
      operationId: create_frame
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Frame'
      responses:
        '200':
          description: 创建成功

    put:
      tags:
        - 框架管理
      summary: 更新框架
      description: 更新框架信息
      operationId: update_frame
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Frame'
      responses:
        '200':
          description: 更新成功

  /api/frame/filter/page:
    post:
      tags:
        - 框架管理
      summary: 分页查询框架
      description: 根据条件分页查询框架列表，支持多种查询条件组合
      operationId: filter_frames
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FrameQueryParam'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultPageResultFrame'

  # ========== 方案管理 ==========
  /api/plan/list:
    get:
      tags:
        - 方案管理
      summary: 查询所有方案
      description: 获取系统中所有方案列表
      operationId: list_plans
      responses:
        '200':
          description: 成功

  /api/plan/{id}:
    get:
      tags:
        - 方案管理
      summary: 根据ID查询方案
      description: 获取指定ID的方案详细信息
      operationId: get_plan
      parameters:
        - name: id
          in: path
          required: true
          description: 方案ID
          schema:
            type: integer
      responses:
        '200':
          description: 成功

    delete:
      tags:
        - 方案管理
      summary: 删除方案
      description: 根据ID删除指定方案
      operationId: delete_plan
      parameters:
        - name: id
          in: path
          required: true
          description: 方案ID
          schema:
            type: integer
      responses:
        '200':
          description: 删除成功

  /api/plan:
    post:
      tags:
        - 方案管理
      summary: 创建方案
      description: 创建新方案
      operationId: create_plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
