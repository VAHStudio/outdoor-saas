  /api/plan-barrier/filter/page:
    post:
      tags:
        - 方案关联管理
      summary: 分页查询方案道闸关联
      description: 分页查询方案与道闸的关联关系，支持多种查询条件组合
      operationId: filter_plan_barriers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanBarrierQueryParam'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultPageResultPlanBarrier'

  /api/plan-barrier:
    post:
      tags:
        - 方案关联管理
      summary: 创建方案道闸关联
      description: 将道闸添加到方案
      operationId: create_plan_barrier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanBarrier'
      responses:
        '200':
          description: 创建成功

  /api/plan-barrier/{id}:
    delete:
      tags:
        - 方案关联管理
      summary: 删除方案道闸关联
      description: 从方案中移除道闸
      operationId: delete_plan_barrier
      parameters:
        - name: id
          in: path
          required: true
          description: 关联ID
          schema:
            type: integer
      responses:
        '200':
          description: 删除成功

  /api/plan-frame/filter/page:
    post:
      tags:
        - 方案关联管理
      summary: 分页查询方案框架关联
      description: 分页查询方案与框架的关联关系，支持多种查询条件组合
      operationId: filter_plan_frames
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanFrameQueryParam'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultPageResultPlanFrame'

  /api/plan-frame:
    post:
      tags:
        - 方案关联管理
      summary: 创建方案框架关联
      description: 将框架添加到方案
      operationId: create_plan_frame
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanFrame'
      responses:
        '200':
          description: 创建成功

  /api/plan-frame/{id}:
    delete:
      tags:
        - 方案关联管理
      summary: 删除方案框架关联
      description: 从方案中移除框架
      operationId: delete_plan_frame
      parameters:
        - name: id
          in: path
          required: true
          description: 关联ID
          schema:
            type: integer
      responses:
        '200':
          description: 删除成功

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 请输入 JWT Token，格式：Bearer {token}
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API Key 鉴权，用于 Dify 等外部工具调用。请联系管理员获取 API Key。

  schemas:
    # ========== 通用响应 ==========
    ResultInteger:
      type: object
      properties:
        code:
          type: integer
          description: 响应码，200表示成功
        message:
          type: string
          description: 响应消息
        data:
          type: integer
          description: 返回的整数数据（通常为ID或影响行数）
        timestamp:
          type: integer
          format: int64
          description: 时间戳

    ResultString:
      type: object
      properties:
        code:
          type: integer
          description: 响应码，200表示成功
        message:
          type: string
          description: 响应消息
        data:
          type: string
          description: 返回的字符串数据
        timestamp:
          type: integer
          format: int64
          description: 时间戳

    # ========== 分页参数基类 ==========
    PageRequest:
      type: object
      description: 分页请求基类，所有分页查询参数都继承此类
      properties:
        pageNum:
          type: integer
          description: 当前页码，从1开始，默认为1
          minimum: 1
          default: 1
        pageSize:
          type: integer
          description: 每页大小，默认为10，最大1000
          minimum: 1
          maximum: 1000
          default: 10
        orderBy:
          type: string
          description: 排序字段名称
        order:
          type: string
          description: 排序方式，asc为升序，desc为降序，默认为desc
          enum: [asc, desc]
          default: desc

    # ========== 基础查询参数 ==========
    BaseQueryParam:
      type: object
      description: 查询参数基类，包含分页、时间范围、关键词搜索等通用参数
      allOf:
        - $ref: '#/components/schemas/PageRequest'
      properties:
        keyword:
          type: string
          description: 关键词搜索，用于名称、编号等字段的模糊搜索
        startTime:
          type: string
          format: date-time
          description: 开始时间，用于时间范围查询
        endTime:
          type: string
          format: date-time
          description: 结束时间，用于时间范围查询
        createdAtBegin:
          type: string
          format: date-time
          description: 创建时间开始，用于查询创建时间在此时间之后的数据
        createdAtEnd:
          type: string
          format: date-time
          description: 创建时间结束，用于查询创建时间在此时间之前的数据
        updatedAtBegin:
          type: string
          format: date-time
          description: 更新时间开始，用于查询更新时间在此时间之后的数据
        updatedAtEnd:
          type: string
          format: date-time
          description: 更新时间结束，用于查询更新时间在此时间之前的数据
        statusList:
          type: string
          description: 状态列表，用于IN查询，多个状态用逗号分隔，如"1,2,3"
        idList:
          type: string
          description: ID列表，用于IN查询，多个ID用逗号分隔，如"1,2,3"

    # ========== 社区 ==========
    Community:
      type: object
      properties:
        id:
          type: integer
          description: 社区ID
        communityNo:
          type: string
          description: 社区编号
        buildingName:
          type: string
          description: 楼栋名称
        buildingAddress:
          type: string
          description: 楼栋地址
        city:
          type: string
          description: 城市
        district:
          type: string
          description: 区县
        street:
          type: string
          description: 街道

    ResultCommunity:
      type: object
      properties:
        code:
          type: integer
          description: 响应码，200表示成功
        message:
          type: string
          description: 响应消息
        data:
          $ref: '#/components/schemas/Community'
        timestamp:
          type: integer
          format: int64
          description: 时间戳

    ResultListCommunity:
      type: object
      properties:
        code:
          type: integer
          description: 响应码，200表示成功
        message:
          type: string
          description: 响应消息
        data:
          type: array
          description: 社区列表
          items:
            $ref: '#/components/schemas/Community'
        timestamp:
          type: integer
          format: int64
          description: 时间戳

    CommunityQueryParam:
      type: object
      description: 社区信息分页查询参数，支持精确匹配、模糊搜索、范围查询、IN查询等多种查询方式
      allOf:
        - $ref: '#/components/schemas/BaseQueryParam'
      properties:
        communityNo:
          type: string
          description: 社区编号（精确匹配）
        communityNoLike:
          type: string
          description: 社区编号模糊搜索，支持部分匹配
        buildingName:
          type: string
          description: 楼栋名称（精确匹配）
        buildingNameLike:
          type: string
          description: 楼栋名称模糊搜索，支持部分匹配
        buildingAddress:
          type: string
          description: 楼栋地址（精确匹配）
        buildingAddressLike:
          type: string
          description: 楼栋地址模糊搜索，支持部分匹配
        city:
          type: string
          description: 城市（精确匹配）
        cityList:
          type: array
          description: 城市列表（IN查询），可同时查询多个城市
          items:
            type: string
        coordLatMin:
          type: number
          format: decimal
          description: 纬度最小值，用于地理位置范围查询
        coordLatMax:
          type: number
          format: decimal
          description: 纬度最大值，用于地理位置范围查询
        coordLngMin:
          type: number
          format: decimal
          description: 经度最小值，用于地理位置范围查询
        coordLngMax:
          type: number
          format: decimal
          description: 经度最大值，用于地理位置范围查询

    # ========== 道闸 ==========
    BarrierGate:
      type: object
      properties:
        id:
          type: integer
          description: 道闸ID
        gateNo:
          type: string
          description: 道闸编号
        deviceNo:
          type: string
          description: 设备编号
        doorLocation:
          type: string
          description: 门岗位置
        devicePosition:
          type: integer
          description: 设备位置
        screenPosition:
          type: integer
          description: 屏幕位置
        lightboxDirection:
          type: integer
          description: 灯箱方向
        communityId:
          type: integer
          description: 所属社区ID

    ResultBarrierGate:
      type: object
      properties:
        code:
          type: integer
          description: 响应码，200表示成功
        message:
          type: string
