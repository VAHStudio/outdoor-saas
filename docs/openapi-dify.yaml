openapi: 3.0.3
info:
  title: Outdoor SaaS API
  version: 1.0.0
  description: |
    户外广告管理系统 REST API
    用于 Dify AI 助手集成

    ## 鉴权说明
    本 API 支持 API Key 鉴权方式，用于 Dify 自定义工具等外部系统调用。

    ### 获取 API Key
    请联系系统管理员获取 API Key。

    ### 使用方式
    在请求头中添加：`X-API-Key: your-api-key`

    ### Dify 配置
    在 Dify 中创建自定义工具时：
    1. 鉴权方式选择 "API Key"
    2. 鉴权字段填写 `X-API-Key`
    3. API Key 值填写管理员提供的密钥

servers:
  - url: http://192.168.31.34:16000
    description: 本地开发环境（frp内网穿透）

paths:
  # ========== 社区管理 ==========
  /api/community/list:
    get:
      tags:
        - 社区管理
      summary: 查询所有社区
      description: 获取系统中所有社区列表
      operationId: list_communities
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultListCommunity'

  /api/community/{id}:
    get:
      tags:
        - 社区管理
      summary: 根据ID查询社区
      description: 获取指定ID的社区详细信息
      operationId: get_community
      parameters:
        - name: id
          in: path
          required: true
          description: 社区ID
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultCommunity'
        '404':
          description: 社区不存在

    delete:
      tags:
        - 社区管理
      summary: 删除社区
      description: 根据ID删除指定社区
      operationId: delete_community
      parameters:
        - name: id
          in: path
          required: true
          description: 社区ID
          schema:
            type: integer
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultInteger'

  /api/community:
    post:
      tags:
        - 社区管理
      summary: 创建社区
      description: 创建新社区
      operationId: create_community
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Community'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultInteger'

    put:
      tags:
        - 社区管理
      summary: 更新社区
      description: 更新社区信息
      operationId: update_community
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Community'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultInteger'

  /api/community/filter/page:
    post:
      tags:
        - 社区管理
      summary: 分页查询社区
      description: 根据条件分页查询社区列表，支持多种查询条件组合
      operationId: filter_communities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommunityQueryParam'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultPageResultCommunity'

  # ========== 道闸管理 ==========
  /api/barrier-gate/list:
    get:
      tags:
        - 道闸管理
      summary: 查询所有道闸
      description: 获取系统中所有道闸列表
      operationId: list_barrier_gates
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultListBarrierGate'

  /api/barrier-gate/{id}:
    get:
      tags:
        - 道闸管理
      summary: 根据ID查询道闸
      description: 获取指定ID的道闸详细信息
      operationId: get_barrier_gate
      parameters:
        - name: id
          in: path
          required: true
          description: 道闸ID
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultBarrierGate'

    delete:
      tags:
        - 道闸管理
      summary: 删除道闸
      description: 根据ID删除指定道闸
      operationId: delete_barrier_gate
      parameters:
        - name: id
          in: path
          required: true
          description: 道闸ID
          schema:
            type: integer
      responses:
        '200':
          description: 删除成功

  /api/barrier-gate:
    post:
      tags:
        - 道闸管理
      summary: 创建道闸
      description: 创建新道闸
      operationId: create_barrier_gate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BarrierGate'
      responses:
        '200':
          description: 创建成功

    put:
      tags:
        - 道闸管理
      summary: 更新道闸
      description: 更新道闸信息
      operationId: update_barrier_gate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BarrierGate'
      responses:
        '200':
          description: 更新成功

  /api/barrier-gate/community/{communityId}:
    get:
      tags:
        - 道闸管理
      summary: 根据社区查询道闸
      description: 获取指定社区下的所有道闸
      operationId: get_barrier_gates_by_community
      parameters:
        - name: communityId
          in: path
          required: true
          description: 社区ID
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  /api/barrier-gate/filter/page:
    post:
      tags:
        - 道闸管理
      summary: 分页查询道闸
      description: 根据条件分页查询道闸列表，支持多种查询条件组合
      operationId: filter_barrier_gates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BarrierGateQueryParam'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultPageResultBarrierGate'

  # ========== 框架管理 ==========
  /api/frame/list:
    get:
