          type: integer
          description: 框架ID（精确匹配）
        frameIdList:
          type: array
          description: 框架ID列表（IN查询），可同时查询多个框架
          items:
            type: integer
        planCommunityId:
          type: integer
          description: 方案社区关联ID（精确匹配），用于查询特定方案社区下的框架
        planCommunityIdList:
          type: array
          description: 方案社区关联ID列表（IN查询），可同时查询多个方案社区
          items:
            type: integer
        releaseStatus:
          type: integer
          description: 发布状态（精确匹配），具体状态码含义请参考枚举定义
        releaseStatusList:
          type: array
          description: 发布状态列表（IN查询），可同时查询多个发布状态
          items:
            type: integer
        releaseDateBeginFrom:
          type: string
          format: date
          description: 发布开始日期范围起点（大于等于），用于筛选发布开始日期在此日期之后的数据
        releaseDateBeginTo:
          type: string
          format: date
          description: 发布开始日期范围终点（小于等于），用于筛选发布开始日期在此日期之前的数据
        releaseDateEndFrom:
          type: string
          format: date
          description: 发布结束日期范围起点（大于等于），用于筛选发布结束日期在此日期之后的数据
        releaseDateEndTo:
          type: string
          format: date
          description: 发布结束日期范围终点（小于等于），用于筛选发布结束日期在此日期之前的数据

    ResultPageResultPlanFrame:
      type: object
      description: 方案框架关联分页查询响应
      properties:
        code:
          type: integer
          description: 响应码，200表示成功
        message:
          type: string
          description: 响应消息
        data:
          type: object
          description: 分页结果
          properties:
            pageNum:
              type: integer
              description: 当前页码
            pageSize:
              type: integer
              description: 每页大小
            total:
              type: integer
              format: int64
              description: 总记录数
            pages:
              type: integer
              description: 总页数
            list:
              type: array
              description: 方案框架关联列表
              items:
                $ref: '#/components/schemas/PlanFrame'
        timestamp:
          type: integer
          format: int64
          description: 时间戳

# 全局安全设置
security:
  - ApiKeyAuth: []
