          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultPageResultPlan'

  # ========== 方案关联管理 ==========
  /api/plan-community/filter/page:
    post:
      tags:
        - 方案关联管理
      summary: 分页查询方案社区关联
      description: 分页查询方案与社区的关联关系，支持多种查询条件组合
      operationId: filter_plan_communities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanCommunityQueryParam'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultPageResultPlanCommunity'

  /api/plan-community:
    post:
      tags:
        - 方案关联管理
      summary: 创建方案社区关联
      description: 将社区添加到方案
      operationId: create_plan_community
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanCommunity'
      responses:
        '200':
          description: 创建成功

  /api/plan-community/{id}:
    delete:
      tags:
        - 方案关联管理
      summary: 删除方案社区关联
      description: 从方案中移除社区
      operationId: delete_plan_community
      parameters:
        - name: id
          in: path
          required: true
          description: 关联ID
          schema:
