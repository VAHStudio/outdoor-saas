server:
  port: ${SERVER_PORT:16000}

spring:
  application:
    name: advertising-system
  web:
    resources:
      static-locations: classpath:/static/,classpath:/public/
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:1111}
    username: ${DB_USERNAME:1111}
    password: ${DB_PASSWORD:1111}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 1000
      connection-timeout: 60000
      idle-timeout: 300000
      max-lifetime: 600000
      connection-test-query: SELECT 1
      pool-name: HikariPool
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    validate-on-migrate: true

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.advertising.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: true
    multiple-result-sets-enabled: true
    use-column-label: true
    use-generated-keys: true
    default-executor-type: simple
    default-statement-timeout: 25000

# 日志配置
logging:
  level:
    com.advertising.mapper: debug

# Kimi AI 配置 (Kimi K2.5)
kimi:
  api:
    key: ${KIMI_API_KE:1111}
    endpoint: ${KIMI_ENDPOINT:https://api.moonshot.ai/v1/chat/completions}
    model: ${KIMI_MODEL:kimi-k2.5}
    thinking: ${KIMI_THINKING:disabled}

# 阿里云语音交互配置
aliyun:
  speech:
    access-key-id: ${ALIYUN_SPEECH_ACCESS_KEY_ID:your-access-key-id}
    access-key-secret: ${ALIYUN_SPEECH_ACCESS_KEY_SECRET:your-access-key-secret}
    app-key: ${ALIYUN_SPEECH_APP_KEY:your-app-key}
    endpoint: ${ALIYUN_SPEECH_ENDPOINT:wss://nls-gateway.cn-shanghai.aliyuncs.com/ws/v1}

# JWT 配置
jwt:
  secret: ${JWT_SECRET:111}
  expiration: ${JWT_EXPIRATION:86400000}
